<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Conclave</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏛️ Model Conclave</h1>
            <p>Multi-agent research and synthesis powered by Google ADK</p>
        </header>

        <div class="input-section">
            <textarea id="queryInput" placeholder="Enter your research question here... (e.g., 'What are the latest best practices for BigQuery security?')"></textarea>
            <button id="submitBtn">Start Research Conclave</button>
        </div>

        <div id="statusSection" class="status-section hidden">
            <p id="statusText">The Model Conclave is in session...</p>
            <div class="progress-bar-container">
                <div id="progressBar" class="progress-bar"></div>
            </div>
            
            <div class="conclave-grid">
                <div id="card-research_a" class="status-card">
                    <div class="card-icon">🧪</div>
                    <div class="card-label">Research Agent A</div>
                    <div class="card-status">Waiting...</div>
                </div>
                <div id="card-research_b" class="status-card">
                    <div class="card-icon">📈</div>
                    <div class="card-label">Research Agent B</div>
                    <div class="card-status">Waiting...</div>
                </div>
                <div id="card-research_c" class="status-card">
                    <div class="card-icon">🔧</div>
                    <div class="card-label">Research Agent C</div>
                    <div class="card-status">Waiting...</div>
                </div>
                <div id="card-synthesizer" class="status-card">
                    <div class="card-icon">🏛️</div>
                    <div class="card-label">Final Synthesis</div>
                    <div class="card-status">Waiting...</div>
                </div>
            </div>
        </div>


        <div id="resultSection" class="result-section hidden">
            <div id="markdownResult"></div>
            <button id="newQueryBtn">New Research Question</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
